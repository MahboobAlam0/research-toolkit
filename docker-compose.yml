# ─── docker-compose.yml ────────────────────────────────────────────────────────
# Local development stack.
# For production, deploy the backend to Railway and use Qdrant Cloud.

services:

  qdrant:
    image: qdrant/qdrant:latest
    container_name: researchkit-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: researchkit-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - DEFAULT_RESUME=${DEFAULT_RESUME:-}
    depends_on:
      - qdrant
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: researchkit-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  qdrant_data:
